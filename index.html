<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* Thiết lập nền cho toàn bộ trang */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Màu đen dự phòng khi chưa tải được ảnh */
            background-color: #000; 
        }

        /* Lớp nền bo cả màn hình */
        body::before {
            content: "";
            position: fixed; /* Ghim cố định toàn màn hình */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./IMG_8622.jpeg') no-repeat center center;
            background-size: cover; /* Phủ kín toàn bộ */
            filter: brightness(0.45); /* Làm tối nền để nổi bật chữ trắng */
            z-index: -1; /* Nằm dưới tất cả các phần tử khác */
        }

        /* Đảm bảo khối chính không có nền đè lên ảnh body */
        .zhengti {
            background: transparent !important;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">
        V25084114 (Ryo Doan)
    </div>
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 3.3rem" href="#">刷新二维码</a>
            </div>
        </div>
        <div class="juzhong footsty yishengxiao word_breath">
            <div onclick="changetxt()">已生效</div>
        </div>
        <div class="juzhong footsty shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // --- GIỮ NGUYÊN TOÀN BỘ LOGIC JAVASCRIPT CỦA BẠN ---
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        document.getElementById('neirong').innerHTML = "<img class='true' src='./true.png'><div class='truetxt'><p class='jinchang'>进场成功</p><p class='riqi' id='dateTime01'></p></div>";
        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    let startTime = localStorage.getItem("startTime") || Date.now();
    if (!localStorage.getItem("startTime")) localStorage.setItem("startTime", startTime);
    startTime = parseInt(startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        document.getElementById('dateTime3').innerHTML = (hrs > 0 ? hrs + ':' : '') + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }, 1000);

    let clickTimestamps = [];
    const refreshBtn = document.querySelector('.shuaxinerweima');
    if (refreshBtn) {
        refreshBtn.addEventListener('click', function (e) {
            e.preventDefault();
            const now = Date.now();
            clickHistory = clickTimestamps.filter(ts => now - ts < 5000);
            clickTimestamps.push(now);
            if (clickTimestamps.length >= 3) {
                startTime = Date.now();
                localStorage.setItem("startTime", startTime);
                clickTimestamps = [];
            }
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
