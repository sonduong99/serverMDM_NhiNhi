<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-title" content="员工码">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="shortcut icon" type="image/png" href="./icon.png">

    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; margin: 0; }
        
        /* THANH TIÊU ĐỀ */
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            font-weight: 400 !important; 
            letter-spacing: normal; 
            text-align: center;
            padding: 10px 0;
        }

        /* KHUNG TRẮNG */
        .erweima { background: #fff; margin: 0 15px; border-radius: 0 0 10px 10px; }
        
        #dateTime00 { 
            padding-top: 4rem; 
            margin-bottom: 1rem; 
            color: #000000;
            font-weight: 500; 
            text-align: center;
        }
        
        #neirong { text-align: center; }
        #neirong img { width: 75%; }
        #neirong1 { padding: 0.5rem 0 4rem; text-align: center; }

        /* NÚT BẤM */
        .shuaxinerweima { 
            text-decoration: none; 
            display: block; 
            color: #000000 !important; 
            margin: 0; 
            font-weight: normal; 
        }

        .juzuo1 { color: white; padding: 15px; font-size: 1rem; }
        .dierhang { 
            padding: 20px; 
            color: #333; 
            background: rgba(255,255,255,0.85); 
            margin: 20px 15px; 
            border-radius: 10px; 
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <p><br><br></p>    
    <div class="zhengti">
        <div class="juzuo1">V25094114 (Doan Nguyen Sang)</div>
        
        <div class="saomatishi">将二维码对准扫描器扫码进出场</div>
        
        <div class="erweima">
            <div id="dateTime00"></div>
            <div id="neirong"><img src="./ewm.gif"></div>
            <div id="neirong1">
                <a class="shuaxinerweima" style="font-size: 3.3rem;" href="javascript:location.reload()">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。</div>
    </div>

<script>
    function update() {
        const d = new Date();
        const datePart = d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0') + '-' + d.getDate().toString().padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = datePart + ' ' + timePart;
    }
    setInterval(update, 1000); 
    update();
</script>
</body>
</html>
