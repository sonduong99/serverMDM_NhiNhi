<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; 
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }
        .zhengti { padding: 20px; box-sizing: border-box; }
        .erweima { background: #fff; border-radius: 15px; padding: 20px; }
        .ewm { width: 250px; height: 250px; object-fit: contain; }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1" style="font-size: 1.2rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;">
        V25084114 (Jon Doan)
    </div>
    <div class="saomatishi juzhong" id="biaoti" style="color: #fff; text-align: center; margin: 20px 0;">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="juzhong erweima">
        <div id="dateTime00" style="font-weight: 500; color: #333; margin-bottom: 10px; font-size: 1.1rem;"></div>
        
        <div id="neirong" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <img class="ewm" src="./ewm.gif">         
        </div>

        <div id="neirong1">    
            <div class="juzhong" style="margin-top: 15px;">
                <a class="shuaxinerweima" style="text-decoration: none; font-size: 2.5rem; color: #007bff; font-weight: bold;" href="#">刷新二维码</a>
            </div>
        </div>

        <div class="juzhong word_breath" style="margin-top: 15px; cursor: pointer; color: #28a745; font-weight: bold;" onclick="changetxt()">
            已生效
        </div>

        <div id="dateTime3" style="font-size: 2.5rem; font-weight: bold; color: #333; margin-top: 10px;">00:00</div>
    </div>

    <div class="dierhang" style="margin-top: 25px; color: #eee; font-size: 0.9rem; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cập nhật đồng hồ thời gian thực
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // 3. HÀM HIỂN THỊ DẤU TÍCH (Đã sửa lỗi méo)
    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        
        const neirong = document.getElementById('neirong');
        // Ép khung hiển thị vuông vắn
        neirong.innerHTML = `
            <div style="padding: 20px;">
                <img src='./true.png' style='width: 130px; height: 130px; object-fit: contain; display: block; margin: 0 auto;'>
                <div style='text-align: center; margin-top: 15px;'>
                    <p style='color: #4caf50; font-size: 1.8rem; font-weight: bold; margin: 0;'>进场成功</p>
                    <p id='dateTime01' style='color: #666; font-size: 1.2rem; margin-top: 5px;'></p>
                </div>
            </div>`;

        // Ẩn nút "Làm mới"
        const neirong1 = document.getElementById('neirong1');
        if(neirong1) neirong1.style.display = "none";

        setInterval(function () {
            const dt1 = document.getElementById('dateTime01');
            if (dt1) dt1.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    // 4. QUẢN LÝ ĐỒNG HỒ ĐẾM GIỜ VÀ CLICK 3 LẦN
    let startTime = localStorage.getItem("startTime");
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("startTime", startTime);
    } else {
        startTime = parseInt(startTime);
    }

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        
        let timeStr = (hrs > 0 ? hrs + ':' : '') + 
                      (mins < 10 ? '0' : '') + mins + ':' + 
                      (secs < 10 ? '0' : '') + secs;
        document.getElementById('dateTime3').innerHTML = timeStr;
    }, 1000);

    let clickTimestamps = [];
    const refreshBtn = document.querySelector('.shuaxinerweima');
    
    if (refreshBtn) {
        refreshBtn.addEventListener('click', function (e) {
            e.preventDefault();
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(ts => now - ts < 5000);
            clickTimestamps.push(now);

            if (clickTimestamps.length >= 3) {
                startTime = Date.now();
                localStorage.setItem("startTime", startTime);
                changetxt(); // Kích hoạt dấu tích xanh
                clickTimestamps = []; 
            }
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
