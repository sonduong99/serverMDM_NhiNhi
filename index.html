<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>员工码</title>
    
    <meta name="apple-mobile-web-app-title" content="员工码">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .zhengti {
            width: 90%;
            max-width: 350px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .user-info {
            color: #fdbd10;
            font-size: 17px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* KHUNG THẺ CHÍNH */
        .card {
            width: 100%;
            background-color: #fff;
            border-radius: 15px; /* Bo góc toàn bộ thẻ */
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* TIÊU ĐỀ VÀNG - Phẳng phía dưới để nối vào phần trắng */
        .card-header {
            background-color: #fdbd10;
            color: #fff;
            padding: 22px 10px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.4;
            border-radius: 15px 15px 0 0; /* Chỉ bo góc trên */
        }

        /* PHẦN NỘI DUNG TRẮNG */
        .card-body {
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* HAI LỖ KHUYẾT TRÒN ĐÚNG TỈ LỆ */
        .hole {
            width: 20px;
            height: 20px;
            background-color: #2b2b3b; /* Màu tối của nền */
            border-radius: 50%;
            position: absolute;
            top: -10px; /* Đặt chính giữa đường kẻ nối */
            z-index: 5;
        }
        .hole-left { left: -10px; }
        .hole-right { right: -10px; }

        .date-time {
            font-size: 21px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* MÃ QR - Đã thu nhỏ để nằm lọt thỏm trong viền trắng */
        .qr-code {
            width: 70% !important; 
            max-width: 210px;
            height: auto;
            margin: 10px 0;
        }

        .refresh-link {
            color: #8e8e93;
            font-size: 18px;
            text-decoration: none;
            margin-top: 15px;
        }

        .status-text {
            color: #34c759; /* Màu xanh lá chuẩn */
            font-size: 30px;
            font-weight: bold;
            margin-top: 5px;
        }

        .timer-text {
            color: #34c759;
            font-size: 20px;
            margin-top: 2px;
        }

        .footer-text {
            color: #a0a0a0;
            font-size: 13px;
            text-align: center;
            margin-top: 25px;
            padding: 0 15px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="zhengti">
        <div class="user-info">V25051817 (Phạm Sơn Dương)</div>
        
        <div class="card">
            <div class="card-header" id="headerTitle">
                将二维码对准扫描器扫码进出场
            </div>
            
            <div class="card-body">
                <div class="hole hole-left"></div>
                <div class="hole hole-right"></div>

                <div class="date-time" id="clockDate"></div>
                
                <div id="qrContainer">
                    <img class="qr-code" src="./ewm.gif">         
                </div>
                
                <div id="refreshArea">    
                    <a class="refresh-link" href="#">刷新二维码</a>
                </div>

                <div class="status-text" id="statusBtn">已生效</div>
                <div class="timer-text" id="stopwatch">00:00</div>
            </div>
        </div>

        <div class="footer-text">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

<script>
    // 1. Cập nhật ngày giờ (Định dạng: YYYY-MM-DD HH:MM:SS)
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clockDate').innerText = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Đồng hồ đếm giây (Stopwatch)
    let startTime = Date.now();
    setInterval(() => {
        let elapsed = Math.floor((Date.now() - startTime) / 1000);
        let mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
        let secs = String(elapsed % 60).padStart(2, '0');
        document.getElementById('stopwatch').innerText = `${mins}:${secs}`;
    }, 1000);

    // 3. Logic nhấn 5 lần vào "已生效"
    let clickCount = 0;
    document.getElementById('statusBtn').onclick = function() {
        clickCount++;
        if (clickCount >= 5) {
            document.getElementById('headerTitle').innerText = "您的设备已符合安全规范";
            document.getElementById('qrContainer').innerHTML = "<img src='./true.png' style='width:90px;margin:30px;'>";
            document.getElementById('refreshArea').style.display = "none";
            clickCount = 0;
        }
    };
</script>
</body>
</html>
