<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>员工码</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-title" content="员工码">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        /* Toàn bộ định dạng để giống hình mẫu 100% */
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #2b2b3b;
        }

        .zhengti {
            width: 92%;
            max-width: 360px;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name-tag {
            color: #fdbd10;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* KHUNG CHÍNH - Chứa thanh vàng và phần trắng */
        .main-card {
            width: 100%;
            background-color: #fff;
            border-radius: 15px;
            overflow: hidden; /* Cắt bỏ phần thừa ra ngoài bo góc */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Thanh tiêu đề vàng */
        .header-yellow {
            width: 100%;
            background-color: #fdbd10;
            color: #fff;
            padding: 18px 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        /* Hai lỗ khuyết tròn */
        .punch-hole {
            width: 20px;
            height: 20px;
            background-color: #1a1a2e; /* Trùng màu nền để giả lỗ khuyết */
            border-radius: 50%;
            position: absolute;
            top: 45px; /* Nằm ngay khớp nối vàng-trắng */
            z-index: 10;
        }
        .left-hole { left: -10px; }
        .right-hole { right: -10px; }

        /* Phần chứa QR */
        .content-area {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .time-now {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Ép mã QR nằm gọn trong khung trắng */
        .qr-image {
            width: 85% !important;
            max-width: 240px !important;
            height: auto !important;
            margin: 10px 0;
        }

        .refresh-text {
            color: #888;
            font-size: 18px;
            text-decoration: none;
            margin: 10px 0;
        }

        .status-active {
            color: #2ecc71;
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .timer {
            color: #2ecc71;
            font-size: 20px;
        }

        .footer-note {
            color: #ccc;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            padding: 0 10px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="zhengti">
        <div class="name-tag">V25051817 (Phạm Sơn Dương)</div>
        
        <div class="main-card">
            <div class="header-yellow" id="biaoti">将二维码对准扫描器扫码进出场</div>
            
            <div class="punch-hole left-hole"></div>
            <div class="punch-hole right-hole"></div>

            <div class="content-area">
                <div class="time-now" id="dateTime00"></div>
                
                <div id="neirong">
                    <img class="qr-image" src="./ewm.gif">         
                </div>
                
                <div id="neirong1">    
                    <a class="refresh-text" href="#" id="refresh-btn">刷新二维码</a>
                </div>

                <div class="status-active" id="trigger-success">已生效</div>

                <div class="timer" id="dateTime3">00:00</div>
            </div>
        </div>

        <div class="footer-note">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

<script>
    // Logic cập nhật thời gian
    function updateTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('dateTime00').innerHTML = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Nhấn 5 lần hiện tích xanh
    let clicks = 0;
    document.getElementById('trigger-success').onclick = function() {
        clicks++;
        if(clicks >= 5) {
            document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
            document.getElementById('neirong').innerHTML = "<img src='./true.png' style='width:100px;margin:20px;'>";
            document.getElementById('neirong1').style.display = "none";
        }
    };

    // Đồng hồ chạy từ khi mở
    let start = Date.now();
    setInterval(() => {
        let diff = Math.floor((Date.now() - start) / 1000);
        let m = String(Math.floor(diff / 60)).padStart(2, '0');
        let s = String(diff % 60).padStart(2, '0');
        document.getElementById('dateTime3').innerText = m + ":" + s;
    }, 1000);
</script>
</body>
</html>
