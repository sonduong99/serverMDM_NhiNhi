<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-title" content="员工码">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        /* CSS sửa lỗi tràn viền trắng */
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .zhengti {
            width: 100%;
            max-width: 400px; /* Giới hạn chiều rộng để không bị tràn */
            padding: 10px;
            box-sizing: border-box;
        }

        /* Khung trắng chứa QR (erweima) */
        .erweima {
            width: 90% !important; /* Ép khung trắng nhỏ lại một chút cho cân đối */
            margin: 0 auto !important;
            padding: 20px !important;
            box-sizing: border-box !important;
            background-color: #fff !important;
            border-radius: 15px !important; /* Bo góc khung trắng */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ép ảnh QR Code phải nằm gọn bên trong viền trắng */
        .ewm {
            width: 100% !important; 
            max-width: 250px !important; /* Cân chỉnh kích thước QR cho vừa mắt */
            height: auto !important;
            display: block;
            margin: 10px auto !important;
        }

        /* Chỉnh lại các dòng chữ để không bị đè nhau */
        .juzuo2 { font-size: 1.2rem !important; margin-bottom: 10px; }
        .shuaxinerweima { font-size: 1.5rem !important; text-decoration: none; }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" style="margin-top: 1rem;" href="#">刷新二维码</a>
            </div>
        </div>

        <div class="juzhong footsty yishengxiao word_breath">
            <div id="trigger-success" style="cursor: pointer; color: #2ecc71;">已生效</div>
        </div>

        <div class="juzhong footsty shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>
    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Giữ nguyên Logic cũ của bạn
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(), "M+": this.getMonth() + 1, "d+": this.getDate(),
            "h+": this.getHours(), "m+": this.getMinutes(), "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    let successClicks = [];
    document.getElementById('trigger-success').addEventListener('click', function() {
        const now = Date.now();
        successClicks = successClicks.filter(ts => now - ts < 3000); 
        successClicks.push(now);
        if (successClicks.length >= 5) {
            changetxt();
            successClicks = []; 
        }
    });

    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        document.getElementById('neirong1').style.display = "none";
        document.getElementById('neirong').innerHTML = "<img class='true' src='./true.png' style='width:100px;margin-top:20px;'><div class='truetxt'><p class='jinchang'>进场成功</p><p class='riqi' id='dateTime01'></p></div>";
        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        let timeStr = (hrs > 0 ? hrs + ':' : '') + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        document.getElementById('dateTime3').innerHTML = timeStr;
    }, 1000);

    let reloadClicks = [];
    document.querySelector('.shuaxinerweima').addEventListener('click', function (e) {
        e.preventDefault();
        const now = Date.now();
        reloadClicks = reloadClicks.filter(ts => now - ts < 4000);
        reloadClicks.push(now);
        if (reloadClicks.length >= 5) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            reloadClicks = [];
        }
    });
</script>
</body>
</html>
