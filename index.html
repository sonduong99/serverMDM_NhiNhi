<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QR Security</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25084114 (Ryo Doan)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div id="dateTime00" class="juzuo2" style="font-weight: 500;"></div>
        
        <div id="main-content">
            <div id="qr-container">
                <img class="ewm" src="./ewm.gif" alt="QR Code">
                <a class="juzhong footsty shuaxinerweima" id="btn-refresh" style="margin-top: 2rem; font-size: 3.3rem" href="#">刷新二维码</a>
            </div>
        </div>

        <div class="juzhong footsty yishengxiao word_breath">
            <div onclick="handleSuccess()">已生效</div>
        </div>

        <div class="juzhong footsty shijian" id="timer-display">00:00</div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // --- CẤU HÌNH & KHỞI TẠO ---
    const elDateTime = document.getElementById('dateTime00');
    const elTimer = document.getElementById('timer-display');
    const elRefresh = document.getElementById('btn-refresh');
    const elMainContent = document.getElementById('main-content');
    const elTitle = document.getElementById('biaoti');

    let clickHistory = [];
    let startTime = parseInt(localStorage.getItem("startTime")) || Date.now();
    if (!localStorage.getItem("startTime")) localStorage.setItem("startTime", startTime);

    // --- CÁC HÀM TIỆN ÍCH ---

    // Định dạng thời gian (Helper)
    const formatTime = (date, pattern = 'full') => {
        const pad = (n) => String(n).padStart(2, '0');
        const y = date.getFullYear(), M = date.getMonth() + 1, d = date.getDate();
        const h = date.getHours(), m = date.getMinutes(), s = date.getSeconds();
        
        if (pattern === 'short') return `${y}-${pad(M)}-${pad(d)} ${pad(h)}:${pad(m)}`;
        return `${y}-${M}-${d} ${pad(h)}:${pad(m)}:${pad(s)}`;
    };

    // Cập nhật đồng hồ bấm giờ
    const updateTimer = () => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const hrs = Math.floor(diff / 3600);
        const mins = Math.floor((diff % 3600) / 60);
        const secs = diff % 60;

        const timeString = hrs > 0 
            ? `${hrs}:${pad(mins)}:${pad(secs)}` 
            : `${pad(mins)}:${pad(secs)}`;
        elTimer.textContent = timeString;
    };
    const pad = (n) => String(n).padStart(2, '0');

    // --- XỬ LÝ SỰ KIỆN ---

    // Khi nhấn "Đã生效" (Success)
    window.handleSuccess = () => {
        elTitle.innerText = "您的设备已符合安全规范";
        elMainContent.innerHTML = `
            <img class="true" src="./true.png">
            <div class="truetxt">
                <p class="jinchang">进场成功</p>
                <p class="riqi">${formatTime(new Date(), 'short')}</p>
            </div>`;
    };

    // Khi nhấn Làm mới QR (Reset timer nếu click 3 lần/5s)
    elRefresh.addEventListener('click', (e) => {
        e.preventDefault();
        const now = Date.now();
        clickHistory = clickHistory.filter(ts => now - ts < 5000);
        clickHistory.push(now);

        if (clickHistory.length >= 3) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            clickHistory = [];
            console.log("Timer Reset!");
        }
    });

    // --- VÒNG LẶP CHÍNH (Chạy mỗi giây) ---
    setInterval(() => {
        const now = new Date();
        elDateTime.textContent = formatTime(now);
        updateTimer();
    }, 1000);

    // Đăng ký Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
    }
</script>
</body>
</html>
