<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="员工码">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; margin: 0; padding: 0; }
        
        .zhengti { width: 100%; text-align: center; padding-top: 2rem; }

        .juzuo1 { color: #f0c040; font-size: 1.2rem; margin-bottom: 1.5rem; }

        /* THANH TIÊU ĐỀ VÀNG */
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            padding: 1.2rem 2rem;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            width: 75%;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* KHUNG TRẮNG CHỨA QR */
        .erweima { 
            background: white; 
            width: 75%; 
            margin: 0 auto; 
            padding-bottom: 2rem;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        #dateTime00 { 
            padding-top: 1.5rem; 
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .ewm { width: 80%; margin: 0 auto; display: block; }

        .shuaxinerweima { 
            text-decoration: none; 
            color: #888 !important; 
            font-size: 1.1rem;
            display: block;
            margin: 1rem 0;
        }

        /* CHỮ "ĐÃ CÓ HIỆU LỰC" - MÀU XANH LÁ */
        .yishengxiao {
            color: #52c41a;
            font-size: 1.8rem;
            font-weight: 500;
            margin-top: 1rem;
        }

        /* BỘ ĐẾM THỜI GIAN DƯỚI CHỮ XANH */
        #dateTime3 {
            color: #52c41a;
            font-size: 1.2rem;
            display: block;
        }

        /* DÒNG THÔNG BÁO DƯỚI CÙNG */
        .dierhang { 
            color: #a0a0a0; 
            width: 80%; 
            margin: 2rem auto; 
            font-size: 0.9rem; 
            text-align: left;
            line-height: 1.4;
        }

        /* Style cho dấu tích xanh khi biến đổi (ẩn) */
        .true { width: 80px; margin: 20px auto; display: block; }
    </style>
</head>
<body>
    <div class="zhengti">
        <div class="juzuo1" id="trigger-success">V25083002 ( Son Nguyen )</div>
        
        <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
        
        <div class="erweima">
            <div id="dateTime00"></div>
            
            <div id="dynamic-content">
                <div id="neirong"><img class="ewm" src="./ewm.gif"></div>
                <a class="shuaxinerweima" href="#">刷新二维码</a>
                
                <div class="yishengxiao">已生效</div>
                <div id="dateTime3">01:19</div>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。</div>
    </div>

<script>
    // Định dạng thời gian
    Date.prototype.format = function (fmt) {
        var o = {"M+": this.getMonth()+1, "d+": this.getDate(), "h+": this.getHours(), "m+": this.getMinutes(), "s+": this.getSeconds()};
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o) if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // Cập nhật giờ hệ thống trên QR
    function tick() {
        document.getElementById('dateTime00').innerText = (new Date()).format('yyyy-M-d hh:mm:ss');
    }
    setInterval(tick, 1000);
    tick();

    // Bộ đếm thời gian (Đã vào được bao lâu)
    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let mins = Math.floor(diff / 60);
        let secs = diff % 60;
        document.getElementById('dateTime3').innerText = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }, 1000);

    // Click 5 lần vào tên để đổi sang trạng thái "Tích xanh thành công"
    let sClicks = [];
    document.getElementById('trigger-success').onclick = function() {
        let now = Date.now();
        sClicks = sClicks.filter(t => now - t < 3000);
        sClicks.push(now);
        if (sClicks.length >= 5) {
            document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
            document.getElementById('dynamic-content').innerHTML = `
                <img class="true" src="./true.png">
                <div style="text-align:center;">
                    <p style="font-size:1.8rem; color:#52c41a; font-weight:bold; margin:0;">进场成功</p>
                    <p style="color:#888; margin-top:5px;">${(new Date()).format('yyyy-MM-dd hh:mm')}</p>
                </div>
            `;
        }
    };

    // Click 5 lần vào "刷新二维码" để reset bộ đếm về 00:00
    let rClicks = [];
    document.querySelector('.shuaxinerweima').onclick = function(e) {
        e.preventDefault();
        let now = Date.now();
        rClicks = rClicks.filter(t => now - t < 3000);
        rClicks.push(now);
        if (rClicks.length >= 5) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            rClicks = [];
        }
    };
</script>
</body>
</html>
