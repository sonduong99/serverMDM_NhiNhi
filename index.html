<html><head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=GBK">

	<link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="./style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('./IMG/IMG_8622.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        /* Làm khung chính trong suốt nhẹ để thấy hình nền phía sau */
        .zhengti {
            background: rgba(255, 255, 255, 0.9) !important; 
            border-radius: 20px;
            margin: 20px auto;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>
<p><br><br></p>	
<div class="zhengti">
	<div class="juzuo1">
			V25050066(Bree Bui)
	</div>
	<div class="saomatishi juzhong" id="biaoti">
		将二维码对准扫描器扫码进出场	
	</div>
	
	<div class="yuan1 yuant"></div>
	<div class="yuan2 yuant"></div>
	
	<div class="juzhong erweima zise">
		<div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
		<div id="neirong">
			<img class="ewm" src="./ewm.gif"> 		
		</div>
		<div id="neirong1">	
			<div>
				<a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 3.3rem" href="javascript:location.reload()">刷新二维码</a>
			</div>
		</div>
		<div class="juzhong footsty yishengxiao word_breath">
			<div style="display: block; cursor: pointer;" onclick="handleSecretClick()">已生效</div>
		</div>
		<div class="juzhong footsty shijian">
			<div id="dateTime3">00:00</div>
		</div>
	</div>
	
	<div class="dierhang">
		尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
	</div>
</div>

<script>
    // 1. Định dạng ngày tháng
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1, 
            "d+": this.getDate(), 
            "h+": this.getHours(), 
            "m+": this.getMinutes(), 
            "s+": this.getSeconds(), 
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cập nhật thời gian thực trên đầu mã QR
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) {
            dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
        }
    }, 1000);

    // 3. Logic nhấn 5 lần bí mật
    let clickCount = 0;
    function handleSecretClick() {
        clickCount++;
        if (clickCount === 5) {
            changetxt();
            clickCount = 0; // Reset đếm
        }
    }

    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        document.getElementById('neirong').innerHTML = "<img class='true' src='./true.png'><div class='truetxt'><p class='jinchang'>进场成功</p><p class='riqi' id='dateTime01'></p></div>";
        
        // Ẩn nút làm mới khi đã thành công
        if(document.getElementById('neirong1')) {
            document.getElementById('neirong1').style.display = "none";
        }

        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) {
                dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
            }
        }, 1000);
    }

    // 4. Logic đồng hồ đếm giờ (dateTime3)
    let startTime = localStorage.getItem("startTime");
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("startTime", startTime);
    } else {
        startTime = parseInt(startTime);
    }

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;

        if (hrs >= 12) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            hrs = 0; mins = 0; secs = 0;
        }

        let displayStr = "";
        if (hrs > 0) {
            displayStr = hrs + ':' + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        } else {
            displayStr = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        }
        document.getElementById('dateTime3').innerHTML = displayStr;
    }, 1000);

    // 5. Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log("Service Worker Registered");
        });
    }
</script>

</body></html>
