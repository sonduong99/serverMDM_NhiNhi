<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>&#8206;</title>
    
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #2c2e3d;
            --text-gold: #dec08d;
            --status-green: #37b76a;
            --status-yellow: #f1c40f;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Noto Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ẢNH NỀN SECURITY DƯỚI CÙNG */
        .security-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            background-image: url('./IMG_8622.jpeg');
            background-size: cover;
            background-position: center bottom;
            opacity: 0.35;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding-top: 50px;
            text-align: center;
            z-index: 10;
        }

        .user-id {
            color: var(--text-gold);
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* THẺ CARD CHÍNH */
        .main-card {
            background: white;
            border-radius: 12px;
            width: 86%;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: visible; /* Để hiện 2 khía tròn */
        }

        /* BANNER MÀU TRÊN ĐẦU CARD */
        .status-banner {
            padding: 16px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 12px 12px 0 0;
            transition: background 0.3s;
        }
        .bg-green { background-color: var(--status-green); }
        .bg-yellow { background-color: var(--status-yellow); }

        /* NỘI DUNG TRONG CARD */
        .card-body {
            padding: 20px;
            position: relative;
        }

        /* HAI KHÍA TRÒN Ở CẠNH (SIDE NOTCHES) */
        .notch {
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background-color: var(--bg-dark);
            border-radius: 50%;
            z-index: 5;
        }
        .notch-left { left: -10px; }
        .notch-right { right: -10px; }

        .system-time {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: #333;
            cursor: pointer;
            font-weight: 500;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        .refresh-text {
            color: #888;
            font-size: 0.95rem;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }

        /* KHU VỰC TRẠNG THÁI "ĐÃ CÓ HIỆU LỰC" */
        .effective-zone {
            margin-top: 15px;
        }
        .effective-label {
            color: var(--status-green);
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .timer-text {
            color: var(--status-green);
            font-family: monospace;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .word_breath {
            animation: breath 2s infinite ease-in-out;
        }
        @keyframes breath {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* DÒNG CHỮ GHI CHÚ CUỐI TRANG */
        .footer-notice {
            margin-top: 35px;
            color: #a2a3ab;
            font-size: 0.88rem;
            line-height: 1.6;
            text-align: justify;
            padding: 0 35px;
            font-weight: 400;
        }
    </style>
</head>
<body>

<div class="security-bg"></div>

<div class="container">
    <div class="user-id">V25051817 (Phạm Sơn Dương)</div>

    <div class="main-card">
        <div id="banner" class="status-banner bg-green">您的设备已符合安全规范</div>
        
        <div class="card-body">
            <div class="notch notch-left"></div>
            <div class="notch notch-right"></div>

            <div id="display-time" class="system-time">2026-4-5 03:43:33</div>
            
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>

            <a href="#" class="refresh-text" id="refresh-qr">刷新二维码</a>

            <div class="effective-zone">
                <div class="effective-label word_breath">已生效</div>
                <div id="elapsed-timer" class="timer-text">0:01:22</div>
            </div>
        </div>
    </div>

    <div class="footer-notice">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Khởi tạo QR Code
    const qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 180, height: 180,
        colorDark : "#000000", colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
    function updateQR() { qrcode.makeCode("MDM-" + Math.random()); }
    updateQR();

    // 2. Đồng hồ hệ thống (yyyy-M-d hh:mm:ss)
    setInterval(() => {
        const now = new Date();
        document.getElementById('display-time').innerText = 
            `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }, 1000);

    // 3. Bộ đếm thời gian (Elapsed Time)
    let startTS = parseInt(localStorage.getItem("mdm_start")) || Date.now();
    localStorage.setItem("mdm_start", startTS);
    setInterval(() => {
        let diff = Math.floor((Date.now() - startTS) / 1000);
        let h = Math.floor(diff / 3600);
        let m = Math.floor((diff % 3600) / 60);
        let s = diff % 60;
        document.getElementById('elapsed-timer').innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);

    // 4. LOGIC ĐỔI TRẠNG THÁI (Chạm vào dòng giờ)
    let isSuccess = true;
    document.getElementById('display-time').onclick = function() {
        const banner = document.getElementById('banner');
        if (isSuccess) {
            banner.innerText = "将二维码对准扫描器扫码进出场";
            banner.className = "status-banner bg-yellow";
            isSuccess = false;
        } else {
            banner.innerText = "您的设备已符合安全规范";
            banner.className = "status-banner bg-green";
            isSuccess = true;
        }
    };

    // 5. Làm mới QR
    document.getElementById('refresh-qr').onclick = function(e) {
        e.preventDefault();
        updateQR();
    };
</script>

</body>
</html>
