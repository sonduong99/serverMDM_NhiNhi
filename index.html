<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>Hệ thống ra vào</title>
    <link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <p><br><br></p>
    <div class="zhengti">
        <div class="juzuo1">
            V205084114(Yamal Doan)
        </div>

        <div class="saomatishi juzhong" id="biaoti">
            将二维码对准扫描器扫码进出场
        </div>

        <div class="yuan1 yuant"></div>
        <div class="yuan2 yuant"></div>

        <div class="juzhong erweima zise">
            <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>

            <div id="neirong">
                <img class="ewm" src="./ewm.gif">
            </div>

            <div id="neirong1">
                <div>
                    <a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 3.3rem" href="javascript:location.reload()">刷新二维码</a>
                </div>
            </div>

            <div class="juzhong footsty yishengxiao word_breath">
                <div id="clickTarget" style="display:block; cursor: pointer;" onclick="handleFiveClicks()">已生效</div>
            </div>

            <div class="juzhong footsty shijian">
                <div id="dateTime3">00:00</div>
            </div>
        </div>

        <div class="dierhang">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

    <script>
        // 1. Định dạng ngày tháng
        Date.prototype.format = function (fmt) {
            var o = {
                "y+": this.getFullYear(),
                "M+": this.getMonth() + 1,
                "d+": this.getDate(),
                "h+": this.getHours(),
                "m+": this.getMinutes(),
                "s+": this.getSeconds(),
            };
            if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
            for (var k in o)
                if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            return fmt;
        }

        // 2. Cập nhật đồng hồ thời gian thực trên cùng
        setInterval(function () {
            const dt = document.getElementById('dateTime00');
            if (dt) {
                dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
            }
        }, 1000);

        // 3. Logic nhấn 5 lần
        let clickCount = 0;
        function handleFiveClicks() {
            clickCount++;
            if (clickCount === 5) {
                changetxt();
                clickCount = 0; // Reset counter
            }
        }

        // 4. Hàm chuyển đổi giao diện sang dấu tích xanh
        function changetxt() {
            // Thay đổi tiêu đề
            document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
            
            // Thay đổi QR Code thành dấu tích thành công
            document.getElementById('neirong').innerHTML = `
                <img class='true' src='./true.png' style='width:150px; margin: 20px auto;'>
                <div class='truetxt'>
                    <p class='jinchang' style='color:#1890ff; font-weight:bold; font-size:2.5rem;'>进场成功</p>
                    <p class='riqi' id='dateTime01' style='font-size:1.5rem;'></p>
                </div>`;
            
            // Ẩn nút làm mới
            if(document.getElementById('neirong1')) document.getElementById('neirong1').style.display = "none";
            
            // Cập nhật thời gian lúc thành công
            setInterval(function () {
                const dt = document.getElementById('dateTime01');
                if (dt) {
                    dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
                }
            }, 1000);
        }

        // 5. Logic đồng hồ đếm thời gian (giữ nguyên của bạn)
        let startTime = localStorage.getItem("startTime");
        if (!startTime) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
        } else {
            startTime = parseInt(startTime);
        }

        setInterval(function () {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let hrs = Math.floor(diff / 3600);
            let mins = Math.floor((diff % 3600) / 60);
            let secs = diff % 60;

            if (hrs >= 12) {
                startTime = Date.now();
                localStorage.setItem("startTime", startTime);
                hrs = 0; mins = 0; secs = 0;
            }

            let displayTime = (hrs > 0 ? hrs + ':' : '') + 
                             (mins < 10 ? '0' : '') + mins + ':' + 
                             (secs < 10 ? '0' : '') + secs;
            document.getElementById('dateTime3').innerHTML = displayTime;
        }, 1000);
    </script>
</body>
</html>
