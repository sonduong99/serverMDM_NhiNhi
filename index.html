<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>QR Code System</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }
        /* Đảm bảo chữ hiển thị rõ trên nền */
        #dateTime00 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        #dateTime3 {
            font-weight: bold;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">V25051817 (Pham Son Duong)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 3.3rem" href="javascript:location.reload();">刷新二维码</a>
            </div>
        </div>

        <div class="juzhong footsty yishengxiao word_breath">
            <div id="trigger-success" style="cursor: pointer;">已生效</div>
        </div>

        <div class="juzhong footsty shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Cấu hình định dạng thời gian chuẩn
    Date.prototype.format = function (fmt) {
        var o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) {
            fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        }
        for (var k in o) {
            if (new RegExp("(" + k + ")").test(fmt)) {
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            }
        }
        return fmt;
    }

    // 2. Cập nhật thời gian hệ thống (Dòng trên QR)
    function updateLiveTime() {
        const dtElement = document.getElementById('dateTime00');
        if (dtElement) {
            // Định dạng: Năm-Tháng-Ngày Giờ:Phút:Giây
            dtElement.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
        }
    }

    // 3. Bộ đếm thời gian trôi qua (Dòng dưới 00:00)
    let secondsElapsed = 0;
    function updateCounter() {
        secondsElapsed++;
        let mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let secs = (secondsElapsed % 60).toString().padStart(2, '0');
        const counterElement = document.getElementById('dateTime3');
        if (counterElement) {
            counterElement.innerHTML = mins + ":" + secs;
        }
    }

    // 4. Kích hoạt tất cả khi trang sẵn sàng
    window.onload = function() {
        // Hiển thị ngay lập tức
        updateLiveTime();
        
        // Thiết lập lặp lại mỗi 1 giây (1000ms)
        setInterval(updateLiveTime, 1000);
        setInterval(updateCounter, 1000);
    };

    // 5. Tính năng phụ: Nhấn 5 lần vào chữ "Đã có hiệu lực" để báo thành công
    let tapCount = 0;
    document.getElementById('trigger-success').addEventListener('click', function() {
        tapCount++;
        if (tapCount === 5) {
            this.innerHTML = "XÁC MINH THÀNH CÔNG";
            this.style.color = "#00FF00"; // Đổi sang màu xanh lá
            tapCount = 0;
        }
        // Tự động reset lượt nhấn sau 3 giây nếu không bấm liên tiếp
        setTimeout(() => { tapCount = 0; }, 3000);
    });
</script>

</body>
</html>
