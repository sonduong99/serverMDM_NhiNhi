<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Sửa lỗi head: Đóng thẻ style đúng cách */
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">
        V25084114 (Jon Doan)
    </div>
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 3.3rem" href="#">刷新二维码</a>
            </div>
        </div>
        <div class="juzhong footsty yishengxiao word_breath">
            <div style="display:" onclick="changetxt()">已生效</div>
        </div>
        <div class="juzhong footsty shijian">
            <script>
                // Định dạng ngày giờ
                Date.prototype.format = function (fmt) {
                    var o = {
                        "y+": this.getFullYear(),
                        "M+": this.getMonth() + 1,
                        "d+": this.getDate(),
                        "h+": this.getHours(),
                        "m+": this.getMinutes(),
                        "s+": this.getSeconds(),
                    };
                    if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
                    for (var k in o)
                        if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
                    return fmt;
                }

                // Cập nhật ngày giờ hiện tại
                setInterval(function () {
                    const dt = document.getElementById('dateTime00');
                    if (dt) {
                        dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
                    }
                }, 1000);

                // Hàm hiển thị DẤU TÍCH XANH (Thành công) - Đã sửa lỗi méo ảnh
                function changetxt() {
                    document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
                    
                    // Sử dụng CSS inline để khống chế tỷ lệ ảnh tích xanh
                    document.getElementById('neirong').innerHTML = `
                        <div style="display: flex; justify-content: center; align-items: center; width: 100%; padding: 10px 0;">
                            <img class='true' src='./true.png' style='width: 130px !important; height: 130px !important; object-fit: contain !important; display: block;'>
                        </div>
                        <div class='truetxt'>
                            <p class='jinchang'>进场成功</p>
                            <p class='riqi' id='dateTime01'></p>
                        </div>`;
                    
                    // Ẩn dòng chữ "Làm mới mã QR"
                    var btnRefresh = document.getElementById('neirong1');
                    if(btnRefresh) btnRefresh.style.display = "none";

                    setInterval(function () {
                        const dt = document.getElementById('dateTime01');
                        if (dt) {
                            dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
                        }
                    }, 1000);
                }
            </script>

            <div id="dateTime3">00:00</div>

            <script>
                // === RESET ĐỒNG HỒ & HIỆN DẤU TÍCH KHI NHẤN 3 LẦN ===
                let startTime = localStorage.getItem("startTime");
                if (!startTime) {
                    startTime = Date.now();
                    localStorage.setItem("startTime", startTime);
                } else {
                    startTime = parseInt(startTime);
                }

                setInterval(function () {
                    let diff = Math.floor((Date.now() - startTime) / 1000); 
                    let hrs = Math.floor(diff / 3600);
                    let mins = Math.floor((diff % 3600) / 60);
                    let secs = diff % 60;

                    if (hrs > 0) {
                        document.getElementById('dateTime3').innerHTML =
                            hrs + ':' + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
                    } else {
                        document.getElementById('dateTime3').innerHTML =
                            (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
                    }
                }, 1000);

                let clickTimestamps = [];

                window.addEventListener('DOMContentLoaded', function () {
                    const reloadLink = document.querySelector('.shuaxinerweima');
                    if (reloadLink) {
                        reloadLink.addEventListener('click', function (e) {
                            e.preventDefault(); 

                            const now = Date.now();
                            clickTimestamps = clickTimestamps.filter(ts => now - ts < 5000);
                            clickTimestamps.push(now);

                            if (clickTimestamps.length >= 3) {
                                // 1. Reset thời gian về 0
                                startTime = Date.now();
                                localStorage.setItem("startTime", startTime);
                                
                                // 2. Hiện dấu tích xanh
                                changetxt();
                                
                                clickTimestamps = []; 
                                console.log("Kích hoạt 3 lần thành công");
                            }
                        });
                    }
                });
            </script>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log("Service Worker Registered v3");
        });
    }
</script>

</body>
</html>
