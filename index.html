<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>&#8206;</title>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body {
            background-color: #2b2d42; /* Nền tối giống hình */
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            display: flex;
            justify-content: center;
        }

        .zhengti {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .juzuo1 {
            color: #dec08d;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .saomatishi {
            padding: 15px;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            border-radius: 12px 12px 0 0;
            transition: background 0.3s;
        }

        /* Các lớp màu trạng thái */
        .bg-green { background-color: #27ae60; }
        .bg-yellow { background-color: #f1c40f; }

        .erweima {
            background: white;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            color: #333;
        }

        .juzuo2 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            cursor: pointer; /* Cho biết có thể nhấn vào */
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .shuaxinerweima {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 15px;
        }

        .yishengxiao {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .shijian {
            color: #27ae60;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .word_breath {
            animation: breath 2s infinite ease-in-out;
        }

        @keyframes breath {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .dierhang {
            margin-top: 30px;
            color: #999;
            font-size: 0.85rem;
            line-height: 1.6;
            text-align: justify;
        }

        /* Success State */
        .true-icon { font-size: 80px; color: #27ae60; margin: 20px 0; }
        .jinchang { color: #27ae60; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    
    <div class="saomatishi bg-green" id="biaoti">您的设备已符合安全规范</div>
    
    <div class="erweima">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        
        <div id="neirong">
            <div id="qrcode"></div>         
        </div>
        
        <div id="neirong1">    
            <a class="shuaxinerweima" id="btn-refresh" href="#">刷新二维码</a>
        </div>

        <div class="yishengxiao word_breath" id="trigger-success">已生效</div>

        <div class="shijian">
            <div id="dateTime3">0:00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Khởi tạo QR
    const qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 180, height: 180,
        colorDark : "#000000", colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
    function makeQR() { qrcode.makeCode("MDM-" + Date.now()); }
    makeQR();

    // 2. Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 3. Cập nhật ngày giờ hệ thống
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // 4. LOGIC CHẠM DÒNG GIỜ ĐỂ ĐỔI MÀU (1 lần -> Vàng, 2 lần -> Xanh)
    let colorToggle = 0;
    document.getElementById('dateTime00').addEventListener('click', function() {
        colorToggle++;
        const banner = document.getElementById('biaoti');
        
        if (colorToggle === 1) {
            banner.innerText = "将二维码对准扫描器扫码进出场";
            banner.className = "saomatishi bg-yellow";
        } else {
            banner.innerText = "您的设备已符合安全规范";
            banner.className = "saomatishi bg-green";
            colorToggle = 0;
        }
    });

    // 5. Logic nhấn 5 lần vào "Đã có hiệu lực" để hiện tích xanh thành công
    let successClicks = 0;
    document.getElementById('trigger-success').onclick = function() {
        successClicks++;
        if (successClicks >= 5) {
            document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
            document.getElementById('biaoti').className = "saomatishi bg-green";
            document.getElementById('neirong').innerHTML = "<div class='true-icon'>✓</div><div class='jinchang'>进场成功</div>";
            document.getElementById('neirong1').style.display = "none";
            successClicks = 0;
        }
    };

    // 6. Đồng hồ đếm thời gian trôi qua
    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        document.getElementById('dateTime3').innerHTML = `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }, 1000);

    // Reset đồng hồ khi nhấn 5 lần nút Refresh
    let reloadCount = 0;
    document.getElementById('btn-refresh').onclick = function(e) {
        e.preventDefault();
        makeQR();
        reloadCount++;
        if (reloadCount >= 5) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            reloadCount = 0;
        }
    };
</script>
</body>
</html>
