<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; 
            margin: 0;
            padding: 0;
        }
        /* Căn chỉnh lại khung trắng chứa mã QR */
        .erweima {
            padding: 20px 0 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #neirong img {
            width: 200px;
            height: 200px;
            margin: 10px 0;
        }
        /* Chỉnh chữ Làm mới mã QR to và có khoảng cách */
        .shuaxinerweima {
            display: block;
            margin-top: 1.5rem !important;
            font-size: 3.3rem !important;
            text-decoration: none;
            color: #666;
        }
        /* Chỉnh đồng hồ đếm giờ bên dưới */
        #dateTime3 {
            font-size: 3.5rem;
            font-weight: bold;
            color: #4caf50; /* Màu xanh lá như trong ảnh */
            margin-top: 1rem;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">
        V25084114 (Jon Doan)
    </div>
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="juzhong erweima zise">
        <div id="dateTime00" style="font-weight: 500; font-size: 1.8rem; margin-bottom: 10px;"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>

        <div id="neirong1">    
            <a class="shuaxinerweima" href="#">刷新二维码</a>
        </div>

        <div class="shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // Quản lý đồng hồ đếm giờ (Timer)
    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);
    startTime = parseInt(startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        document.getElementById('dateTime3').innerHTML = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }, 1000);

    // Nhấn 3 lần để reset timer
    let clickTimestamps = [];
    document.querySelector('.shuaxinerweima').addEventListener('click', function (e) {
        e.preventDefault();
        const now = Date.now();
        clickTimestamps = clickTimestamps.filter(ts => now - ts < 5000);
        clickTimestamps.push(now);
        if (clickTimestamps.length >= 3) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            clickTimestamps = [];
        }
    });
</script>
</body>
</html>
