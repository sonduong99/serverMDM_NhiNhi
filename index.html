<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>QR Code System</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }

        /* Chỉnh thời gian to vừa phải, không quá nổi bật */
        #dateTime00 {
            color: #444; /* Màu xám đậm tự nhiên */
            font-size: 1.5rem; 
            font-weight: 500;
            margin-bottom: 12px;
        }

        #dateTime3 {
            font-size: 2.8rem; /* To rõ ràng nhưng không chiếm quá nhiều không gian */
            font-weight: 600;
            color: #333;
        }

        /* Nút làm mới chữ xanh dịu */
        .shuaxinerweima {
            text-decoration: none;
            color: #007bff; 
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">V25051817 (Pham Son Duong)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif" style="width: 65%;">         
        </div>
        
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" id="resetBtn" style="margin-top: 1.5rem; font-size: 3rem; cursor: pointer;">刷新二维码</a>
            </div>
        </div>

        <div class="juzhong footsty yishengxiao word_breath">
            <div id="trigger-success" style="cursor: pointer;">已生效</div>
        </div>

        <div class="juzhong footsty shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Hàm định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) 
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    let secondsElapsed = 0;

    function updatePageData() {
        // 1. Cập nhật ngày giờ hệ thống
        const topDt = document.getElementById('dateTime00');
        if (topDt) topDt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');

        // 2. Tăng và cập nhật bộ đếm
        secondsElapsed++;
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        const bottomDt = document.getElementById('dateTime3');
        if (bottomDt) bottomDt.innerHTML = m + ":" + s;
    }

    // Sự kiện nhấn nút xanh để reset bộ đếm về 0
    document.getElementById('resetBtn').addEventListener('click', function(e) {
        e.preventDefault();
        secondsElapsed = 0;
        const bottomDt = document.getElementById('dateTime3');
        if (bottomDt) bottomDt.innerHTML = "00:00";
    });

    window.onload = function() {
        // Hiện ngay lập tức dòng ngày tháng
        const topDt = document.getElementById('dateTime00');
        if (topDt) topDt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
        
        // Chạy vòng lặp mỗi giây
        setInterval(updatePageData, 1000);
    };

    // Nhấn 5 lần "Đã có hiệu lực" để báo thành công
    let tapCount = 0;
    document.getElementById('trigger-success').addEventListener('click', function() {
        tapCount++;
        if (tapCount === 5) {
            this.style.color = "#28a745";
            this.innerHTML = "XÁC THỰC THÀNH CÔNG";
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 2000);
    });
</script>

</body>
</html>
