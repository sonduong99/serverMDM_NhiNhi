<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quét mã</title>
    
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: url("./IMG_8622.jpeg") no-repeat center center fixed; 
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            color: #fff; /* Màu chữ mặc định */
        }

        .zhengti {
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.4); /* Lớp phủ tối để dễ đọc chữ */
        }

        .juzhong { text-align: center; }
        .juzuo1 { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .saomatishi { font-size: 1.5rem; margin-bottom: 30px; }
        
        .erweima {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 15px;
            margin: 0 auto;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .ewm { width: 200px; height: 200px; margin: 15px 0; }
        .true { width: 100px; margin: 15px 0; }

        .shuaxinerweima {
            display: block;
            text-decoration: none;
            color: #673ab7;
            font-weight: bold;
            margin-top: 10px;
        }

        .word_breath {
            animation: breath 2s infinite alternate;
            cursor: pointer;
            color: #4caf50;
            font-weight: bold;
            margin-top: 15px;
        }

        @keyframes breath {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .dierhang {
            margin-top: 30px;
            font-size: 0.9rem;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
    </style>

    <link rel="stylesheet" href="./style.css">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">
        V25084114 (Ryo Doan)
    </div>
    
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="juzhong erweima">
        <div id="dateTime00" style="font-weight: 500; font-size: 1.2rem;"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif" alt="QR Code">         
        </div>

        <div id="neirong1">    
            <a class="shuaxinerweima" id="btn-refresh" href="#">刷新二维码</a>
        </div>

        <div class="word_breath" onclick="changetxt()">
            <div>已生效</div>
        </div>

        <div class="shijian" style="font-size: 2rem; margin-top: 10px;">
            <span id="dateTime3">00:00</span>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // Cập nhật ngày giờ phía trên mã QR
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) {
            dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
        }
    }, 1000);

    // Xử lý khi nhấn "Đã có hiệu lực" (已生效)
    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        const neirong = document.getElementById('neirong');
        neirong.innerHTML = `
            <img class="true" src="./true.png">
            <div class='truetxt'>
                <p style="font-size: 1.5rem; color: #4caf50; font-weight: bold; margin: 5px 0;">进场成功</p>
                <p id='dateTime01' style="font-size: 1rem; color: #666;"></p>
            </div>`;

        setInterval(function () {
            const dt1 = document.getElementById('dateTime01');
            if (dt1) {
                dt1.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
            }
        }, 1000);
    }

    // === QUẢN LÝ ĐỒNG HỒ ĐẾM GIỜ ===
    let startTime = localStorage.getItem("startTime");
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("startTime", startTime);
    } else {
        startTime = parseInt(startTime);
    }

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;

        let display = "";
        if (hrs > 0) display += hrs + ':';
        display += (mins < 10 ? '0' : '') + mins + ':';
        display += (secs < 10 ? '0' : '') + secs;
        
        document.getElementById('dateTime3').innerHTML = display;
    }, 1000);

    // Reset khi nhấn 3 lần trong 5 giây
    let clickTimestamps = [];
    const refreshBtn = document.getElementById('btn-refresh');
    
    refreshBtn.addEventListener('click', function (e) {
        e.preventDefault();
        const now = Date.now();
        clickTimestamps = clickTimestamps.filter(ts => now - ts < 5000);
        clickTimestamps.push(now);

        if (clickTimestamps.length >= 3) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            clickTimestamps = [];
            alert("Đã đặt lại thời gian!");
        }
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log("Service Worker Registered");
        }).catch(err => console.log("SW Error:", err));
    }
</script>
</body>
</html>
