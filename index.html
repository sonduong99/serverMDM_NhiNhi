<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>员工码</title>

    <meta name="apple-mobile-web-app-title" content="员工码">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="./icon.png?v=3">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=3">

    <link rel="shortcut icon" href="./icon.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }
        /* Đảm bảo nội dung không bị dính sát mép trên iPhone có tai thỏ */
        .zhengti {
            padding-top: env(safe-area-inset-top);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ewm {
            width: 200px;
            height: 200px;
            display: block;
            margin: 0 auto;
        }
        .true {
            width: 100px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">
        V25051825 (Nguyễn Thị Nhi)
    </div>
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场    
    </div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" style="margin-top: 2rem; font-size: 1.5rem; text-decoration: none;" href="#">刷新二维码</a>
            </div>
        </div>
        <div class="juzhong footsty yishengxiao word_breath">
            <div style="cursor: pointer;" onclick="changetxt()">已生效</div>
        </div>
        <div class="juzhong footsty shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Định dạng ngày giờ hệ thống
    Date.prototype.format = function (fmt) {
        var o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // 2. Xử lý khi bấm "已生效"
    function changetxt() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        document.getElementById('neirong').innerHTML = "<img class='true' src='./true.png'><div class='truetxt'><p class='jinchang'>进场成功</p><p class='riqi' id='dateTime01'></p></div>";
        document.getElementById('neirong1').style.display = "none";

        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    // 3. Logic Đếm giờ & Reset khi nhấn 3 lần
    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        let timeStr = (hrs > 0 ? hrs + ':' : '') + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        document.getElementById('dateTime3').innerHTML = timeStr;
    }, 1000);

    let clickTimestamps = [];
    const reloadLink = document.querySelector('.shuaxinerweima');
    if (reloadLink) {
        reloadLink.addEventListener('click', function (e) {
            e.preventDefault();
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(ts => now - ts < 5000);
            clickTimestamps.push(now);
            if (clickTimestamps.length >= 3) {
                startTime = Date.now();
                localStorage.setItem("startTime", startTime);
                clickTimestamps = [];
            }
        });
    }

    // Đăng ký Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
    }
</script>
</body>
</html>
